name: Build Electron App

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v0.1.0)
  workflow_dispatch: # Allow manual triggering

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Use LTS or current, better-sqlite3 supports >=18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        env:
          TAPDANCE_SKIP_POSTINSTALL_NATIVE_CHECK: '1'

      - name: Verify Version Tag
        run: npm run version:check-tag -- ${{ github.ref_name }}

      - name: Ensure Electron native dependencies
        run: node scripts/ensure-electron-native-modules.mjs

      - name: Build & Package (Mac)
        if: matrix.os == 'macos-latest'
        run: npm run pack:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Package (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run pack:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (Mac)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tapdance-mac-app
          path: |
            release/*.dmg
          retention-days: 7

      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tapdance-windows-app
          path: |
            release/*.exe
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Mac Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tapdance-mac-app
          path: release-artifacts/mac

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: tapdance-windows-app
          path: release-artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/mac/*
            release-artifacts/windows/*
